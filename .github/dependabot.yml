version: 2
updates:
  - package-ecosystem: nuget
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dotnet-packages:
        patterns:
          - '*'

  - package-ecosystem: npm
    directory: '/frontend'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      frontend-packages:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - '*'
