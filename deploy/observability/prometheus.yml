global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: order-tracking-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]
  - job_name: order-tracking-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9464"]
