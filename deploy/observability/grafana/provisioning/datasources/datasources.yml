apiVersion: 1

datasources:
  - name: Prometheus
    uid: prom
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true

  - name: OpenSearch
    uid: os
    type: grafana-opensearch-datasource
    access: proxy
    url: http://opensearch:9200
    editable: true
    jsonData:
      database: ""
      flavor: opensearch
      version: "2.11.0"
      timeField: "@timestamp"
      index: "otel-logs*"
      logMessageField: message
      logLevelField: log.level

  - name: VictoriaLogs
    uid: vl
    type: victoriametrics-logs-datasource
    access: proxy
    url: http://victorialogs:9428
    editable: true
