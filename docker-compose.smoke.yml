# Минимальный стек для проверки запуска API в CI (без Jaeger/Loki/OpenSearch и т.д.).
# Образ order-tracking-api:local должен быть собран заранее: docker compose build api
# Запуск: docker compose -f docker-compose.smoke.yml up -d --wait && curl -fsS http://127.0.0.1:15086/health
name: order-tracking-smoke

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: order_tracking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "25432:5432"
    volumes:
      - postgres_smoke_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 8

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
      - --smp
      - "1"
      - --memory
      - "1G"
      - --mode
      - dev-container
      - --default-log-level=warn
    ports:
      - "29092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy'"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: order-tracking-api:local
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_HTTP_PORTS=
      - DOTNET_RUNNING_IN_CONTAINER=true
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=order_tracking;Username=postgres;Password=postgres
      - Kafka__BootstrapServers=redpanda:9092
      - Kafka__ClientId=order-tracking-api
      - Kafka__OrderStatusTopic=order.status.v1
      - Kafka__ConsumerGroupId=order-tracking-api-ci-smoke
      - Kafka__EnableAutoCommit=false
      - Kafka__AutoOffsetReset=Earliest
      - OpenTelemetry__Exporters__Otlp=false
      - OpenTelemetry__Exporters__Console=false
      - DemoTraffic__Enabled=false
    ports:
      - "15086:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s

volumes:
  postgres_smoke_data:
