services:
  postgres:
    image: postgres:16-alpine
    container_name: order-tracking-postgres
    environment:
      POSTGRES_DB: order_tracking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: order-tracking-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
      - --smp
      - "1"
      - --memory
      - "1G"
      - --mode
      - dev-container
      - --default-log-level=info
    ports:
      - "19092:19092"
      - "18081:18081"
      - "18082:18082"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy'"]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: order-tracking-jaeger
    ports:
      - "16686:16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  loki:
    image: grafana/loki:2.9.4
    container_name: order-tracking-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "13100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3100/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  victorialogs:
    image: victoriametrics/victoria-logs:v1.48.0
    container_name: order-tracking-victorialogs
    ports:
      - "9428:9428"

  opensearch:
    image: opensearchproject/opensearch:2.11.1
    container_name: order-tracking-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf 'http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow&timeout=120s' -o /dev/null"]
      interval: 15s
      timeout: 130s
      retries: 8
      start_period: 90s

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.1
    container_name: order-tracking-opensearch-dashboards
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: order-tracking-otel-collector
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./deploy/observability/otel-collector-config.yml:/etc/otelcol/config.yml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      jaeger:
        condition: service_started
      loki:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      victorialogs:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: order-tracking-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      otel-collector:
        condition: service_started
      api:
        condition: service_started
      worker:
        condition: service_started

  grafana:
    image: grafana/grafana:11.3.0
    container_name: order-tracking-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_HTTP_ADDR: 0.0.0.0
      # Плагин VictoriaLogs: Explore + Logs panel с языком LogsQL
      GF_INSTALL_PLUGINS: victoriametrics-logs-datasource
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning
      - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "13001:3000"
    depends_on:
      - prometheus
      - loki
      - opensearch
      - victorialogs

  api:
    image: order-tracking-api:local
    build:
      context: .
      dockerfile: src/OrderTracking.Presentation.Api/Dockerfile
    container_name: order-tracking-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      # Явная привязка Kestrel в Program.cs (0.0.0.0:8080) — как в smoke; без этого на части окружений healthcheck не попадает на слушатель
      - DOTNET_RUNNING_IN_CONTAINER=true
      # Пустое значение снимает дефолт образа (8080 через deferred endpoints), чтобы совпадало с app.Urls в Program.cs
      - ASPNETCORE_HTTP_PORTS=
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=order_tracking;Username=postgres;Password=postgres
      - Kafka__BootstrapServers=redpanda:9092
      - Kafka__ClientId=order-tracking-api
      - Kafka__OrderStatusTopic=order.status.v1
      - Kafka__ConsumerGroupId=order-tracking-api
      - Kafka__EnableAutoCommit=false
      - Kafka__AutoOffsetReset=Earliest
      - OpenTelemetry__ServiceName=order-tracking-api
      - OpenTelemetry__Otlp__Endpoint=http://otel-collector:4317
      - OpenTelemetry__Exporters__Otlp=true
      - OpenTelemetry__Exporters__Console=false
      - DemoTraffic__Enabled=true
      - DemoTraffic__BaseUrl=http://127.0.0.1:8080
      # Больше раундов — стабильнее Kafka / SignalR трассы в Jaeger после первых секунд up
      - DemoTraffic__Rounds=40
      - DemoTraffic__DelayMs=4000
    ports:
      - "5086:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s

  worker:
    image: order-tracking-worker:local
    build:
      context: .
      dockerfile: src/OrderTracking.Presentation.Worker/Dockerfile
    container_name: order-tracking-worker
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=order_tracking;Username=postgres;Password=postgres
      - Kafka__BootstrapServers=redpanda:9092
      - Kafka__ClientId=order-tracking-worker
      - Kafka__OrderStatusTopic=order.status.v1
      - OutboxDispatcher__BatchSize=50
      - OutboxDispatcher__PollIntervalSeconds=2
      - OutboxDispatcher__MaxAttempts=10
      - OpenTelemetry__ServiceName=order-tracking-worker
      - OpenTelemetry__Otlp__Endpoint=http://otel-collector:4317
      - OpenTelemetry__Exporters__Otlp=true
      - OpenTelemetry__Exporters__Console=false
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      otel-collector:
        condition: service_started

  frontend:
    image: order-tracking-frontend:local
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5086
        VITE_SIGNALR_HUB_URL: http://localhost:5086/hubs/orders
    container_name: order-tracking-frontend
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
